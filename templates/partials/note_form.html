<details class="advanced note-section" data-note-section>
  <summary>Notes (optional)</summary>

  <p class="media-section-note">
    Extra textual information about this AI resource. Add one item for each note.
  </p>

  <textarea id="{{ note_prefix }}note_json" name="note_json" hidden>{{ note_json_value or "[]" }}</textarea>

  <div class="note-list" data-note-list></div>

  <button type="button" class="button-link media-add-button" data-note-add>
    Add note
  </button>
</details>
